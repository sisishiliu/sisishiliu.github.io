<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tally">
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Tally</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== Today View ===== -->
    <section id="view-today" class="view active">
      <header class="view-header">
        <h1>今日训练</h1>
        <p id="today-date" class="header-sub"></p>
      </header>
      <div class="view-scroll">
        <div id="today-complete-banner" class="complete-banner" hidden>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M6 10.5l3 3 5.5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          今日目标已全部完成
        </div>
        <div id="task-list"></div>
        <div id="today-empty" class="empty-state" hidden>
          <svg class="empty-icon" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="1.5" opacity=".2"/><path d="M28 40h24M40 28v24" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".25"/></svg>
          <p class="empty-title">还没有训练任务</p>
          <p class="empty-sub">去「管理」页面创建一个吧</p>
        </div>
      </div>
    </section>

    <!-- ===== Insights View ===== -->
    <section id="view-insights" class="view">
      <header class="view-header">
        <h1>统计</h1>
      </header>
      <div class="view-scroll">
        <div id="period-selector" class="seg-ctrl">
          <button class="seg-btn active" data-days="30">30天</button>
          <button class="seg-btn" data-days="90">90天</button>
          <button class="seg-btn" data-days="360">360天</button>
        </div>
        <div id="charts-container"></div>
        <div id="insights-empty" class="empty-state" hidden>
          <svg class="empty-icon" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="1.5" opacity=".2"/><path d="M24 52l10-16 8 8 14-20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".25"/></svg>
          <p class="empty-title">暂无统计数据</p>
          <p class="empty-sub">记录训练后这里会显示趋势图</p>
        </div>
      </div>
    </section>

    <!-- ===== Manage View ===== -->
    <section id="view-manage" class="view">
      <header class="view-header">
        <h1>管理</h1>
      </header>
      <div class="view-scroll">
        <button id="add-task-btn" class="add-btn">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          添加训练任务
        </button>
        <div id="manage-list"></div>
        <div id="manage-empty" class="empty-state small" hidden>
          <p class="empty-title">还没有训练任务</p>
        </div>

        <div class="data-section">
          <h3 class="section-label">数据管理</h3>
          <button id="export-btn" class="export-btn">导出数据</button>
          <div class="data-warning">
            <p class="warn-head">⚠ 数据安全提示</p>
            <p>你的数据仅保存在本设备浏览器中。以下操作会导致数据永久丢失：</p>
            <ul>
              <li>清除浏览器 / Safari 数据</li>
              <li>卸载本应用或删除主屏幕图标</li>
              <li>使用无痕 / 隐私浏览模式</li>
            </ul>
            <p>建议定期使用「导出数据」功能备份。</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Tab Bar ===== -->
    <nav id="tab-bar">
      <button class="tab active" data-view="today">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9 5a2 2 0 012-2h2a2 2 0 012 2a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 14l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>今日</span>
      </button>
      <button class="tab" data-view="insights">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 16l4-6 4 4 5-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>统计</span>
      </button>
      <button class="tab" data-view="manage">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>管理</span>
      </button>
    </nav>

    <!-- ===== Record Modal ===== -->
    <div id="record-overlay" class="overlay" hidden></div>
    <div id="record-modal" class="sheet" hidden>
      <div class="sheet-handle"></div>
      <h2 id="record-title" class="sheet-title"></h2>
      <div class="record-display">
        <span id="record-val" class="record-num"></span>
        <span id="record-unit" class="record-unit-label"></span>
      </div>
      <div class="slider-row">
        <span id="slider-min" class="slider-bound"></span>
        <input type="range" id="record-slider" class="ios-slider">
        <span id="slider-max" class="slider-bound"></span>
      </div>
      <button id="record-confirm" class="primary-btn">确认记录</button>
    </div>

    <!-- ===== Task Form Modal ===== -->
    <div id="form-overlay" class="overlay" hidden></div>
    <div id="task-form" class="form-sheet" hidden>
      <div class="sheet-handle"></div>
      <div class="form-nav">
        <button id="form-cancel" class="nav-link">取消</button>
        <h2 id="form-title" class="sheet-title">新建训练任务</h2>
        <button id="form-save" class="nav-link accent">保存</button>
      </div>
      <div class="form-body">
        <label class="field-label">任务名称</label>
        <input type="text" id="f-name" class="field-input" placeholder="如：俯卧撑" maxlength="20" autocomplete="off">
        <label class="field-label">计数单位</label>
        <div id="unit-group" class="unit-group">
          <button class="unit-btn active" data-unit="个">个</button>
          <button class="unit-btn" data-unit="次">次</button>
          <button class="unit-btn" data-unit="秒">秒</button>
          <button class="unit-btn" data-unit="分钟">分钟</button>
        </div>
        <label class="field-label">滑杆范围</label>
        <div class="range-row">
          <input type="number" id="f-min" class="field-input small" value="1" min="0" max="99999" inputmode="numeric">
          <span class="range-sep">—</span>
          <input type="number" id="f-max" class="field-input small" value="50" min="1" max="99999" inputmode="numeric">
        </div>
        <label class="field-label">每日目标总量 <span class="hint">(可选)</span></label>
        <div class="goal-row">
          <input type="number" id="f-goal" class="field-input small" placeholder="不设" min="1" max="99999" inputmode="numeric">
          <span id="f-goal-unit" class="goal-unit">个</span>
        </div>
      </div>
      <button id="form-delete" class="delete-btn" hidden>删除此任务</button>
    </div>

    <!-- ===== Confirm Dialog ===== -->
    <div id="confirm-overlay" class="overlay darker" hidden></div>
    <div id="confirm-dialog" class="confirm" hidden>
      <div class="confirm-body">
        <h3 id="confirm-title"></h3>
        <p id="confirm-msg"></p>
      </div>
      <div class="confirm-actions">
        <button id="confirm-no" class="confirm-btn">取消</button>
        <button id="confirm-yes" class="confirm-btn danger">删除</button>
      </div>
    </div>

    <!-- ===== Fullscreen Chart ===== -->
    <div id="fs-chart" class="fs-chart" hidden>
      <div class="fs-top">
        <span id="fs-title" class="fs-title-text"></span>
        <button id="fs-close" class="fs-close">&times;</button>
      </div>
      <div class="fs-body">
        <canvas id="fs-canvas"></canvas>
      </div>
      <div id="fs-tooltip" class="fs-tooltip" hidden></div>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast" hidden>
      <span id="toast-msg"></span>
      <button id="toast-undo" class="toast-undo" hidden>撤销</button>
    </div>

  </div>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
